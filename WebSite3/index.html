<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Menu Bar -->
    <div class="menu-bar">
        <div class="menu-title">Character Editor</div>
        <div class="menu-actions">
            <button id="render-btn">Export Image</button>
        </div>
    </div>

    <div class="editor-container">
        <!-- Left Panel - Hierarchy/Assets -->
        <div class="left-panel">
            <div class="panel-header">Assets</div>
            <div class="asset-list">
                <div class="asset-category">
                    <div class="category-header">Models</div>
                    <div class="asset-item" data-model="assets/Nik-Daig-Rig.glb" data-format="gltf">
                        <span class="asset-icon">📦</span>
                        <span>Nik Daig Rig</span>
                    </div>
                </div>
                <div class="asset-category">
                    <div class="category-header">Textures</div>
                    <div class="texture-grid" id="texture-list">
                        <!-- Textures will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Center - Scene View -->
        <div class="scene-view">
            <div class="scene-toolbar">
                <div class="toolbar-group">
                    <button class="tool-btn active" title="Move">⊕</button>
                    <button class="tool-btn" title="Rotate">↻</button>
                    <button class="tool-btn" title="Scale">⊞</button>
                </div>
                <div class="toolbar-group">
                    <label class="toolbar-label">
                        <input type="checkbox" id="transparent-bg"> Alpha
                    </label>
                    <label class="toolbar-label">
                        <input type="checkbox" id="show-grid" checked> Grid
                    </label>
                </div>
            </div>
            <canvas id="canvas3d"></canvas>
            <div id="loading">Loading...</div>
        </div>

        <!-- Right Panel - Inspector -->
        <div class="right-panel">
            <div class="panel-header">Inspector</div>
            <div class="inspector-content">
                
                <!-- Transform -->
                <div class="inspector-section">
                    <div class="section-header">Transform</div>
                    <div class="property-row">
                        <label>Bone</label>
                        <select id="bone-select">
                            <option value="">Select Bone</option>
                        </select>
                    </div>
                    <div class="property-row">
                        <label>Rotation X</label>
                        <input type="number" id="rotate-x" min="-180" max="180" value="0" step="1">
                        <input type="range" id="rotate-x-slider" min="-180" max="180" value="0">
                    </div>
                    <div class="property-row">
                        <label>Rotation Y</label>
                        <input type="number" id="rotate-y" min="-180" max="180" value="0" step="1">
                        <input type="range" id="rotate-y-slider" min="-180" max="180" value="0">
                    </div>
                    <div class="property-row">
                        <label>Rotation Z</label>
                        <input type="number" id="rotate-z" min="-180" max="180" value="0" step="1">
                        <input type="range" id="rotate-z-slider" min="-180" max="180" value="0">
                    </div>
                    <button id="reset-pose" class="full-width">Reset Pose</button>
                </div>

                <!-- Objects Visibility -->
                <div class="inspector-section">
                    <div class="section-header">Objects</div>
                    <div id="objects-list" class="property-row" style="max-height: 200px; overflow-y: auto;">
                        <div style="color: #666; font-size: 11px;">Load a model to see objects</div>
                    </div>
                </div>

                <!-- Material -->
                <div class="inspector-section">
                    <div class="section-header">Material</div>
                    <div class="property-row">
                        <label>Material</label>
                        <select id="material-select">
                            <option value="">Select Material</option>
                        </select>
                    </div>
                    <div class="property-row">
                        <label>Color</label>
                        <input type="color" id="color-picker" value="#ffffff">
                    </div>
                    <div class="property-row">
                        <label>Texture</label>
                        <select id="texture-select">
                            <option value="">None</option>
                        </select>
                    </div>
                </div>

                <!-- Lighting -->
                <div class="inspector-section">
                    <div class="section-header">Lighting</div>
                    <div class="property-row">
                        <label>Intensity</label>
                        <input type="number" id="light-intensity" min="0" max="3" step="0.1" value="1">
                    </div>
                    <div class="property-row">
                        <label>Ambient</label>
                        <input type="number" id="ambient-light" min="0" max="2" step="0.1" value="0.5">
                    </div>
                    <div class="property-row">
                        <label>Color</label>
                        <input type="color" id="light-color" value="#ffffff">
                    </div>
                </div>

                <!-- Background -->
                <div class="inspector-section">
                    <div class="section-header">Background</div>
                    <div class="property-row">
                        <label>Color</label>
                        <input type="color" id="bg-color" value="#383838">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
