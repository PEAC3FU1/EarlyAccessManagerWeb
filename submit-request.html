<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request - Early Access Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            padding-top: 0;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-header {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .sidebar-header i {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }
        
        .sidebar-header h2 {
            font-family: 'Orbitron', sans-serif;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }
        
        .sidebar-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .nav-menu {
            margin-bottom: 30px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        
        .nav-item i {
            font-size: 1.2rem;
        }
        
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .game-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
        }
        
        .game-card-thumbnail {
            width: 100%;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .game-card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-card-content {
            padding: 20px;
        }
        
        .game-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .game-card-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .game-details-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .game-thumbnail {
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-info {
            padding: 40px;
        }
        
        #submission-form-container {
            display: none;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fi fi-sr-shield-check"></i>
            <h2>Early Access Manager</h2>
            <p class="made-by-sidebar">made by peaceful <span class="heart">♥</span></p>
            <p id="user-greeting">Loading...</p>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <i class="fi fi-sr-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="submit-request.html" class="nav-item active">
                <i class="fi fi-sr-gamepad"></i>
                <span>Submit Request</span>
            </a>
            <a href="admin.html" class="nav-item" id="admin-nav" style="display: none;">
                <i class="fi fi-sr-shield-check"></i>
                <span>Admin Panel</span>
            </a>
            <a href="#" class="nav-item" id="signout-btn">
                <i class="fi fi-sr-sign-out-alt"></i>
                <span>Sign Out</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Game Gallery -->
        <div id="game-gallery">
            <h2 style="font-family: 'Orbitron', sans-serif; margin-bottom: 10px;">Browse Games</h2>
            <p style="color: rgba(255, 255, 255, 0.6); margin-bottom: 20px; font-size: 1rem;">Select a game to request early access</p>
            
            <!-- Search Box -->
            <div class="search-box" style="margin-bottom: 30px;">
                <div class="input-wrapper">
                    <span class="input-prefix">Search:</span>
                    <input type="text" id="game-search" placeholder="Search games..." autocomplete="off">
                </div>
            </div>
            
            <div id="games-grid" class="games-grid"></div>
        </div>

        <!-- Game Details -->
        <div id="game-details" style="display: none;">
            <button id="back-to-gallery" class="btn-text" style="margin-bottom: 20px;">← Back to Games</button>
            <div class="game-details-card">
                <div class="game-thumbnail">
                    <img id="game-thumbnail-img" src="" alt="Game Thumbnail">
                </div>
                <div class="game-info">
                    <h2 id="game-details-title" style="font-family: 'Orbitron', sans-serif; margin-bottom: 15px;"></h2>
                    <p id="game-details-description" style="color: rgba(255, 255, 255, 0.7); line-height: 1.6; margin-bottom: 30px;"></p>
                    <button id="request-access-btn" class="btn-primary btn-large">
                        <i class="fi fi-sr-key"></i>
                        <span id="btn-text">Get Early Access</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Submission Form -->
        <div id="submission-form-container" style="display: none;">
            <button id="back-to-details" class="btn-text" style="margin-bottom: 20px;">← Back to Game Details</button>
            <div class="form-card">
                <h2><span id="selected-game-title"></span></h2>
                <form id="submission-form">
                    <div class="form-group">
                        <label for="player-id">Player ID</label>
                        <input type="text" id="player-id" required>
                    </div>
                    <div class="form-group">
                        <label for="player-name">In-Game Username</label>
                        <input type="text" id="player-name" required>
                    </div>
                    <button type="submit" class="btn-primary">Submit Request</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        let selectedGame = null;
        let userSubmission = null;
        let allGames = [];
        
        // Check auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = user;
            
            // Load games
            await loadGames();
            
            // Check for existing submission
            userSubmission = await checkUserSubmission(user.uid);
            
            // Display games gallery
            displayGamesGallery(GAMES);
            
            // Update greeting
            const profile = await database.ref(`user-profiles/${user.uid}`).once('value');
            const username = profile.val()?.username || user.displayName || 'User';
            document.getElementById('user-greeting').textContent = username;
            
            // Show admin nav if admin
            if (user.uid === ADMIN_UID) {
                document.getElementById('admin-nav').style.display = 'flex';
            }
            
            hideLoading();
        });
        
        // Search functionality
        const gameSearchInput = document.getElementById('game-search');
        gameSearchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (query.length === 0) {
                displayGamesGallery(GAMES);
                return;
            }
            
            const filtered = GAMES.filter(game => 
                game.name.toLowerCase().includes(query) ||
                (game.description && game.description.toLowerCase().includes(query))
            );
            
            displayGamesGallery(filtered);
        });
        
        // Display Games Gallery
        function displayGamesGallery(games) {
            const gamesGrid = document.getElementById('games-grid');
            
            if (games.length === 0) {
                gamesGrid.innerHTML = '<p style="color: rgba(255, 255, 255, 0.6); text-align: center; padding: 40px; font-size: 1.1rem;">No games found. Please add games to Firebase Database.</p>';
                return;
            }
            
            gamesGrid.innerHTML = games.map(game => `
                <a href="${game.id}.html" class="game-card" style="text-decoration: none; color: inherit; display: block;">
                    <div class="game-card-thumbnail">
                        <img src="${game.thumbnail || 'https://via.placeholder.com/400x300/000000/ffffff?text=' + encodeURIComponent(game.name)}" 
                             alt="${game.name}"
                             onerror="this.src='https://via.placeholder.com/400x300/000000/ffffff?text=${encodeURIComponent(game.name)}'">
                    </div>
                    <div class="game-card-content">
                        <div class="game-card-title">${game.name}</div>
                        <div class="game-card-description">${game.description || 'Request early access to this game'}</div>
                    </div>
                </a>
            `).join('');
        }
        
        // Show Game Details
        function showGameDetails() {
            document.getElementById('game-gallery').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
            
            document.getElementById('game-thumbnail-img').src = selectedGame.thumbnail || 'https://via.placeholder.com/800x400/000000/ffffff?text=' + encodeURIComponent(selectedGame.name);
            document.getElementById('game-thumbnail-img').onerror = function() {
                this.src = 'https://via.placeholder.com/800x400/000000/ffffff?text=' + encodeURIComponent(selectedGame.name);
            };
            document.getElementById('game-details-title').textContent = selectedGame.name;
            document.getElementById('game-details-description').textContent = selectedGame.description || 'Request early access to unlock exclusive content and features before the official release.';
            
            // Check if user already has a submission for this game
            const hasSubmission = userSubmission && userSubmission.gameId === selectedGame.id;
            const btnText = document.getElementById('btn-text');
            const requestBtn = document.getElementById('request-access-btn');
            
            if (hasSubmission) {
                if (userSubmission.status === 'approved') {
                    btnText.textContent = 'Get Code';
                } else if (userSubmission.status === 'pending') {
                    btnText.textContent = 'Pending Approval';
                    requestBtn.disabled = true;
                    requestBtn.style.opacity = '0.6';
                    requestBtn.style.cursor = 'not-allowed';
                } else {
                    btnText.textContent = 'Get Early Access';
                    requestBtn.disabled = false;
                    requestBtn.style.opacity = '1';
                    requestBtn.style.cursor = 'pointer';
                }
            } else {
                btnText.textContent = 'Get Early Access';
                requestBtn.disabled = false;
                requestBtn.style.opacity = '1';
                requestBtn.style.cursor = 'pointer';
            }
        }
        
        // Back to gallery
        document.getElementById('back-to-gallery').addEventListener('click', () => {
            document.getElementById('game-details').style.display = 'none';
            document.getElementById('game-gallery').style.display = 'block';
        });
        
        // Request access button
        document.getElementById('request-access-btn').addEventListener('click', () => {
            const hasSubmission = userSubmission && userSubmission.gameId === selectedGame.id;
            
            if (hasSubmission && userSubmission.status === 'approved') {
                // Show code
                alert(`Your verification code: ${userSubmission.verificationCode}`);
                window.location.href = 'dashboard.html';
            } else if (!hasSubmission || userSubmission.status === 'rejected') {
                // Show submission form
                showSubmissionForm();
            }
        });
        
        function showSubmissionForm() {
            document.getElementById('game-details').style.display = 'none';
            document.getElementById('submission-form-container').style.display = 'block';
            document.getElementById('selected-game-title').textContent = selectedGame.name;
        }
        
        document.getElementById('back-to-details').addEventListener('click', () => {
            document.getElementById('submission-form-container').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
        });
        
        // Form submission
        document.getElementById('submission-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading();
            
            const playerId = document.getElementById('player-id').value.trim();
            const playerName = document.getElementById('player-name').value.trim();
            
            try {
                const userProfileRef = database.ref(`user-profiles/${currentUser.uid}`);
                const profileSnapshot = await userProfileRef.once('value');
                const profile = profileSnapshot.val();
                
                const submissionRef = database.ref('submissions').push();
                await submissionRef.set({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: profile?.username || currentUser.displayName,
                    gameId: selectedGame.id,
                    gameName: selectedGame.name,
                    playerId: playerId,
                    playerName: playerName,
                    status: 'pending',
                    submittedAt: Date.now(),
                    verificationCode: null,
                    verified: false
                });
                
                alert('Request submitted successfully!');
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Submission error:', error);
                alert('Submission failed. Please try again.');
            }
            
            hideLoading();
        });
        
        // Sign out
        document.getElementById('signout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
