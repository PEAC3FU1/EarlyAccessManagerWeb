<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approved Games - Early Access Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            padding-top: 0;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-header {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .sidebar-header i {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }
        
        .sidebar-header h2 {
            font-family: 'Orbitron', sans-serif;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }
        
        .sidebar-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .nav-menu {
            margin-bottom: 30px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        
        .nav-item i {
            font-size: 1.2rem;
        }
        
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }
        
        .approved-games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .approved-game-card {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .approved-game-card:hover {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.5);
            transform: translateY(-5px);
        }
        
        .approved-badge {
            display: inline-block;
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.6);
            color: #4caf50;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }
        
        .game-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .game-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .get-code-btn {
            width: 100%;
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.6);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .get-code-btn:hover {
            background: rgba(76, 175, 80, 0.4);
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fi fi-sr-shield-check"></i>
            <h2>Early Access Manager</h2>
            <p class="made-by-sidebar">made by peaceful <span class="heart">♥</span></p>
            <p id="user-greeting">Loading...</p>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <i class="fi fi-sr-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="submit-request.html" class="nav-item">
                <i class="fi fi-sr-gamepad"></i>
                <span>Browse Games</span>
            </a>
            <a href="approved-games.html" class="nav-item active">
                <i class="fi fi-sr-check-circle"></i>
                <span>Approved Games</span>
            </a>
            <a href="admin.html" class="nav-item" id="admin-nav" style="display: none;">
                <i class="fi fi-sr-shield-check"></i>
                <span>Admin Panel</span>
            </a>
            <a href="#" class="nav-item" id="signout-btn">
                <i class="fi fi-sr-sign-out-alt"></i>
                <span>Sign Out</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 style="font-family: 'Orbitron', sans-serif; margin-bottom: 10px;">Approved Games</h2>
        <p style="color: rgba(255, 255, 255, 0.6); margin-bottom: 30px; font-size: 1rem;">View your approved early access requests</p>
        
        <div id="approved-games-grid" class="approved-games-grid"></div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Check auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = user;
            
            // Update greeting
            const profile = await database.ref(`user-profiles/${user.uid}`).once('value');
            const username = profile.val()?.username || user.displayName || 'User';
            document.getElementById('user-greeting').textContent = username;
            
            // Show admin nav if admin
            if (user.uid === ADMIN_UID) {
                document.getElementById('admin-nav').style.display = 'flex';
            }
            
            // Load approved games
            loadApprovedGames(user.uid);
            
            hideLoading();
        });
        
        async function loadApprovedGames(userId) {
            const submissionsRef = database.ref('submissions');
            const snapshot = await submissionsRef.orderByChild('userId').equalTo(userId).once('value');
            
            const approvedGames = [];
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.status === 'approved') {
                        approvedGames.push({
                            id: childSnapshot.key,
                            ...data
                        });
                    }
                });
            }
            
            const grid = document.getElementById('approved-games-grid');
            
            if (approvedGames.length === 0) {
                grid.innerHTML = '<p style="color: rgba(255, 255, 255, 0.6); text-align: center; padding: 40px; font-size: 1.1rem;">No approved games yet. Submit a request to get started!</p>';
                return;
            }
            
            // Sort by approval date (newest first)
            approvedGames.sort((a, b) => (b.approvedAt || 0) - (a.approvedAt || 0));
            
            grid.innerHTML = approvedGames.map(game => {
                const approvedDate = game.approvedAt ? new Date(game.approvedAt).toLocaleDateString() : 'Recently';
                return `
                    <a href="${game.gameId}.html" class="approved-game-card">
                        <div class="approved-badge">✓ Approved</div>
                        <div class="game-name">${game.gameName}</div>
                        <div class="game-date">Approved on ${approvedDate}</div>
                        <button class="get-code-btn">
                            <i class="fi fi-sr-key"></i>
                            Get Code
                        </button>
                    </a>
                `;
            }).join('');
        }
        
        // Sign out
        document.getElementById('signout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
